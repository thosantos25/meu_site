<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos - Rio de Janeiro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .foto-galeria {
            height: 250px; /* Define uma altura fixa para todas as fotos */
            object-fit: cover; /* Faz a imagem preencher o espaço sem distorcer */
            transition: transform 0.3s ease; /* Prepara a animação de zoom */
        }
        
        /* Efeito de zoom quando o mouse passa por cima da foto */
        .foto-galeria:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container mt-5 mb-5">
        
        <div class="text-center mb-5">
            <h1 class="text-primary fw-bold">Galeria: Cidade Maravilhosa</h1>
            <p class="lead">Inspire-se com as paisagens de tirar o fôlego do Rio de Janeiro.</p>
            
            <a href="{% url 'inicio' %}" class="btn btn-outline-primary mt-2">Voltar para o Início</a>
        </div>

        <div class="row g-4">
            
            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100 overflow-hidden">
                    <img src="https://images.pexels.com/photos/351283/pexels-photo-351283.jpeg" class="foto-galeria w-100" alt="Cristo Redentor">
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100 overflow-hidden">
                    <img src="https://images.pexels.com/photos/2868242/pexels-photo-2868242.jpeg" class="foto-galeria w-100" alt="Praia no Rio">
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100 overflow-hidden">
                    <img src="https://images.pexels.com/photos/1804177/pexels-photo-1804177.jpeg" class="foto-galeria w-100" alt="Calçadão de Copacabana">
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100 overflow-hidden">
                    <img src="https://images.pexels.com/photos/2868245/pexels-photo-2868245.jpeg" class="foto-galeria w-100" alt="Pôr do Sol no Rio">
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100 overflow-hidden">
                    <img src="https://images.pexels.com/photos/4202155/pexels-photo-4202155.jpeg" class="foto-galeria w-100" alt="Pão de Açúcar">
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card shadow-sm h-100 overflow-hidden">
                    <img src="https://images.pexels.com/photos/156738/pexels-photo-156738.jpeg" class="foto-galeria w-100" alt="Vista Aérea do Rio">
                </div>
            </div>

        </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
